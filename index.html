<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo das Palavras</title>
    <link rel="shortcut icon" href="https://i.pinimg.com/736x/1c/b0/36/1cb036974125540f50aeaa131ce56b3e.jpg" type="image/x-icon">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>Jogo das <span>Palavras</span></h1>

        <!-- Tela Inicial (setup-container) -->
        <div id="setup-container">
            <input onkeydown="iniciarJogo(event)" type="text" id="nickname-input" placeholder="Digite seu nickname...">
            <select id="dificuldade-input">
                <option value="facil">Fácil</option>
                <option value="medio">Médio</option>
                <option value="dificil">Difícil</option>
            </select>
        </div>

        <!-- Tela do Jogo (game-container) -->
        <div id="game-container" class="hidden">
            <h2 id="player-display"></h2>
            <h3 id="dificuldade-display"></h3>

            <!-- Exibe as letras (word-display) -->
            <div id="word-display" class="word-slots"></div>

            <!-- Dica -->
            <p id="hint-display" class="hint"></p>

            <!-- Campo de entrada de dados (input) -->
            <input onkeydown="tentarLetra(event)" type="text" id="letter-input" maxlength="1" placeholder="?">

            <!-- Mostra o status do jogo (status-info) -->
            <div class="status-info">
                <p>Erros: <span id="error-count">0</span> / 4</p>
                <p id="game-message"></p>
            </div>
            
            <button onclick="reiniciarJogo()" id="reset-btn" class="hidden">Jogar Novamente</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
